# ============================================================
# /project 状态文件模板
# 复制此文件为 .claude/projects/<你的项目名>.yaml
# ============================================================

name: my-project
created: 2026-07-02

# ── 项目背景（每次 /project 都会加载此段）──
# 写清楚：要做什么、关键决策、约束条件。控制在 200 字以内。
context: |
  项目的一句话定位。

  核心决策：
  1. 决定A — 原因
  2. 决定B — 原因

  约束：时间/技术/资源的限制。

# ── 步骤定义（DAG）──
# status: done | in_progress | blocked | pending
# deps: 依赖的步骤 id 列表，全部 done 后本步骤才可开始
# outputs: 产出文件的相对路径列表（可以为空数组 []）
# summary: 「完成 N」时的一句话摘要
# checkpoint: 「保存 N」时创建的步骤内断点，仅 in_progress 时存在，「完成 N」后清除
#   checkpoint.done: 已完成的具体事项
#   checkpoint.remaining: 待完成的具体事项
#   checkpoint.notes: 中途发现/决策（可选）
steps:
  - id: step-1
    name: 步骤名称
    status: pending
    deps: []
    outputs: []
    summary: ""

  - id: step-2
    name: 可并行的步骤
    status: pending
    deps: []                 # ← 无依赖，可以和 step-1 并行推进
    outputs: []
    summary: ""

  - id: step-3
    name: 依赖前两步的步骤
    status: blocked
    deps: [step-1, step-2]   # ← 依赖 step-1 和 step-2 都完成
    outputs: []
    summary: ""

# ── checkpoint 示例（使用「保存 N」时自动生成）──
